<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 210" fill="none">
  <defs>
    <linearGradient id="bolt-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="ring-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow-dark" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: Stylized compression bolt inside hexagonal ring -->
  <g transform="translate(90, 90)">
    <!-- Outer hexagonal ring -->
    <polygon points="0,-72 62.4,-36 62.4,36 0,72 -62.4,36 -62.4,-36"
             fill="none" stroke="url(#ring-grad-dark)" stroke-width="4" opacity="0.25"/>
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30"
             fill="none" stroke="url(#ring-grad-dark)" stroke-width="2.5" opacity="0.5"/>

    <!-- Inner quantization grid (4x4 = 16 levels) -->
    <g opacity="0.2">
      <rect x="-32" y="-32" width="16" height="16" rx="2" fill="#818cf8"/>
      <rect x="-14" y="-32" width="16" height="16" rx="2" fill="#8b5cf6"/>
      <rect x="0" y="-32" width="16" height="16" rx="2" fill="#a78bfa"/>
      <rect x="16" y="-32" width="16" height="16" rx="2" fill="#c084fc"/>
      <rect x="-32" y="-14" width="16" height="16" rx="2" fill="#8b5cf6"/>
      <rect x="-14" y="-14" width="16" height="16" rx="2" fill="#a78bfa"/>
      <rect x="0" y="-14" width="16" height="16" rx="2" fill="#c084fc"/>
      <rect x="16" y="-14" width="16" height="16" rx="2" fill="#d8b4fe"/>
      <rect x="-32" y="2" width="16" height="16" rx="2" fill="#a78bfa"/>
      <rect x="-14" y="2" width="16" height="16" rx="2" fill="#c084fc"/>
      <rect x="0" y="2" width="16" height="16" rx="2" fill="#d8b4fe"/>
      <rect x="16" y="2" width="16" height="16" rx="2" fill="#e9d5ff"/>
      <rect x="-32" y="18" width="16" height="16" rx="2" fill="#c084fc"/>
      <rect x="-14" y="18" width="16" height="16" rx="2" fill="#d8b4fe"/>
      <rect x="0" y="18" width="16" height="16" rx="2" fill="#e9d5ff"/>
      <rect x="16" y="18" width="16" height="16" rx="2" fill="#f3e8ff"/>
    </g>

    <!-- Lightning bolt (compression speed) -->
    <path d="M -8,-42 L 8,-8 L -2,-8 L 8,42 L -8,8 L 2,8 Z"
          fill="url(#bolt-grad-dark)" filter="url(#glow-dark)"/>

    <!-- Rotation arrows -->
    <path d="M -44,0 A 44,44 0 0,1 0,-44" fill="none" stroke="#818cf8" stroke-width="1.5"
          stroke-dasharray="4,3" opacity="0.35"/>
    <path d="M 44,0 A 44,44 0 0,1 0,44" fill="none" stroke="#c084fc" stroke-width="1.5"
          stroke-dasharray="4,3" opacity="0.35"/>
  </g>

  <!-- Text: FlashQuant -->
  <text x="170" y="80" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="58" font-weight="800" letter-spacing="-2">
    <tspan fill="#e2e8f0">Flash</tspan><tspan fill="url(#bolt-grad-dark)">Quant</tspan>
  </text>

  <!-- Tagline -->
  <text x="172" y="115" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="16" font-weight="500" fill="#94a3b8" letter-spacing="0.5">
    Extreme KV Cache Compression for LLM Inference
  </text>

  <!-- Consultant branding -->
  <text x="172" y="143" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="18" font-weight="700" fill="#ef4444" letter-spacing="1.5">
    AYI NEDJIMI CONSULTANTS
  </text>

  <!-- Accent line -->
  <rect x="170" y="155" width="380" height="2" rx="1" fill="url(#bolt-grad-dark)" opacity="0.3"/>

  <!-- Tech badges inline -->
  <g transform="translate(172, 175)" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="11">
    <rect x="0" y="0" width="50" height="20" rx="4" fill="#818cf8" opacity="0.15"/>
    <text x="25" y="14" text-anchor="middle" fill="#a5b4fc" font-weight="600">C++17</text>

    <rect x="58" y="0" width="48" height="20" rx="4" fill="#4ade80" opacity="0.15"/>
    <text x="82" y="14" text-anchor="middle" fill="#86efac" font-weight="600">CUDA</text>

    <rect x="114" y="0" width="56" height="20" rx="4" fill="#fb923c" opacity="0.15"/>
    <text x="142" y="14" text-anchor="middle" fill="#fdba74" font-weight="600">PyTorch</text>

    <rect x="178" y="0" width="44" height="20" rx="4" fill="#38bdf8" opacity="0.15"/>
    <text x="200" y="14" text-anchor="middle" fill="#7dd3fc" font-weight="600">vLLM</text>

    <rect x="230" y="0" width="82" height="20" rx="4" fill="#a78bfa" opacity="0.15"/>
    <text x="271" y="14" text-anchor="middle" fill="#c4b5fd" font-weight="600">TurboQuant</text>
  </g>
</svg>
